version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: promptuser
      POSTGRES_PASSWORD: promptpass
      POSTGRES_DB: promptdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptuser -d promptdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: "postgresql+asyncpg://promptuser:promptpass@db:5432/promptdb"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-change-me-in-production}"
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
      FERNET_SECRET_KEY: "${FERNET_SECRET_KEY:-change-me-in-production}"
      FIRST_SUPERUSER_EMAIL: "${FIRST_SUPERUSER_EMAIL:-admin@example.com}"
      FIRST_SUPERUSER_PASSWORD: "${FIRST_SUPERUSER_PASSWORD:-admin123}"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
